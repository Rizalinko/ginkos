general {
    colors = true
    interval = 5
    color_good     = "#C8A951"
    color_degraded = "#CC8800"
    color_bad      = "#CC3333"
}

order += "wireless _first_"
order += "ethernet _first_"
order += "memory"
order += "cpu_usage"
order += "tztime local"

wireless _first_ {
    format_up   = "  %essid %quality"
    format_down = "  disconnected"
}

ethernet _first_ {
    format_up   = "  %speed"
    format_down = "  disconnected"
}

memory {
    format = "  %used / %total"
    threshold_degraded = "10%"
}

cpu_usage {
    format = "  %usage"
}

tztime local {
    format = "  %Y-%m-%d %H:%M"
}
