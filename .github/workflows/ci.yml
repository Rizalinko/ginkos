name: GinkOS CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt-get install -y shellcheck
          pip install flake8

      - name: Shellcheck
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -exec shellcheck {} +

      - name: Flake8
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -exec flake8 --max-line-length=100 {} +

  test-python-tools:
    name: Test Python Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-rich

      - name: Test gink-info
        run: |
          python3 packages/ginkos-sysinfo/usr/local/bin/gink-info

      - name: Test gink-freeze
        run: |
          sudo mkdir -p /etc/ginkos
          sudo python3 packages/ginkos-sysinfo/usr/local/bin/gink-freeze
          test -f /etc/ginkos/manifest.json
          echo "manifest.json created:"
          cat /etc/ginkos/manifest.json | python3 -m json.tool | head -20

      - name: Test gink-audit
        run: |
          python3 packages/ginkos-sysinfo/usr/local/bin/gink-audit

  build-debs:
    name: Build .deb Packages
    runs-on: ubuntu-latest
    needs: [lint, test-python-tools]
    steps:
      - uses: actions/checkout@v4

      - name: Build ginkos-defaults
        run: |
          dpkg-deb --build --root-owner-group \
            packages/ginkos-defaults \
            packages/ginkos-defaults.deb

      - name: Build ginkos-sysinfo
        run: |
          dpkg-deb --build --root-owner-group \
            packages/ginkos-sysinfo \
            packages/ginkos-sysinfo.deb

      - name: Verify packages
        run: |
          dpkg-deb --info packages/ginkos-defaults.deb
          dpkg-deb --info packages/ginkos-sysinfo.deb

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ginkos-packages
          path: packages/*.deb
          retention-days: 30

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-debs
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: ginkos-packages
          path: packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: GinkOS ${{ github.ref_name }}
          body: |
            ## GinkOS ${{ github.ref_name }} (maidenhair)

            ### Packages
            - `ginkos-defaults` — i3 config, wallpaper, branding
            - `ginkos-sysinfo` — gink-info, gink-freeze, gink-audit

            ### Install
            ```bash
            dpkg -i ginkos-defaults.deb ginkos-sysinfo.deb
            ```
          files: packages/*.deb
